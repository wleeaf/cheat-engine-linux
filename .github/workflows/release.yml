name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # action-gh-release needs this to upload assets / create the release

jobs:
  appimage:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Lua 5.3 is vendored under third_party/lua and built by CMake — no
      # upstream checkout needed.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            qt6-base-dev \
            libcapstone-dev \
            zlib1g-dev \
            libdw-dev \
            libasound2-dev \
            libsoundtouch-dev \
            libfuse2t64 \
            ca-certificates \
            file \
            wget \
            imagemagick

      - name: Cache FetchContent + build directory
        uses: actions/cache@v6
        with:
          path: build/_deps
          key: cecore-deps-release-${{ runner.os }}-keystone-0.9.2-v2

      - name: Configure + build (Release)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j"$(nproc)"

      - name: Run regression suite
        run: ./build/cecore_test

      - name: Build .deb package
        run: (cd build && cpack -G DEB)

      - name: Build AppImage
        run: |
          # build-appimage.sh fetches linuxdeploy + the Qt plugin + appimagetool
          # (into build/appimage-tools), bundles Qt libs AND plugins correctly, and
          # writes build/CheatEngine-<version>-x86_64.AppImage. It reuses the build/
          # above and runs the tools with APPIMAGE_EXTRACT_AND_RUN=1 (no FUSE needed).
          bash packaging/build-appimage.sh
          file build/CheatEngine-*-x86_64.AppImage

      - name: Upload AppImage to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/CheatEngine-*-x86_64.AppImage
            build/cheat-engine-linux_*_amd64.deb
          fail_on_unmatched_files: true
          generate_release_notes: false
