name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # action-gh-release needs this to upload assets / create the release

jobs:
  appimage:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Lua 5.3 is vendored under third_party/lua and built by CMake — no
      # upstream checkout needed.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            qt6-base-dev \
            libcapstone-dev \
            zlib1g-dev \
            libdw-dev \
            libasound2-dev \
            libsoundtouch-dev \
            libfuse2t64 \
            ca-certificates \
            file \
            wget \
            imagemagick

      - name: Cache FetchContent + build directory
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cecore-deps-release-${{ runner.os }}-keystone-0.9.2-v2

      - name: Configure + build (Release)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j"$(nproc)"

      - name: Run regression suite
        run: ./build/cecore_test

      - name: Fetch appimagetool
        run: |
          wget -q -O appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          # packaging/build-appimage.sh resolves paths relative to itself, so it
          # runs correctly from the repo root and reuses the build/ above.
          bash packaging/build-appimage.sh
          # The packaging script falls back to "AppDir ready" when appimagetool
          # isn't on PATH; pack ourselves here so the asset always exists.
          # Append --appimage-extract-and-run as a fallback if libfuse2 isn't
          # usable on the runner (containerised environments without FUSE).
          if ! ./appimagetool build/AppDir build/CheatEngine-x86_64.AppImage; then
            ./appimagetool --appimage-extract-and-run build/AppDir build/CheatEngine-x86_64.AppImage
          fi
          file build/CheatEngine-x86_64.AppImage

      - name: Upload AppImage to the release
        uses: softprops/action-gh-release@v2
        with:
          files: build/CheatEngine-x86_64.AppImage
          fail_on_unmatched_files: true
          generate_release_notes: false
