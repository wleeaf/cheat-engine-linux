name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # action-gh-release needs this to upload assets / create the release

jobs:
  appimage:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout cecore
        uses: actions/checkout@v4
        with:
          path: cecore

      - name: Sparse-checkout upstream Cheat Engine for Lua + ceserver
        run: |
          git clone --filter=blob:none --no-checkout --depth=1 \
            https://github.com/cheat-engine/cheat-engine.git "Cheat Engine"
          cd "Cheat Engine"
          git sparse-checkout init --no-cone
          git sparse-checkout set "Cheat Engine/lua53" "Cheat Engine/ceserver"
          git checkout
          if [ -d "Cheat Engine/lua53" ]; then
            mv "Cheat Engine"/* . 2>/dev/null || true
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            qt6-base-dev \
            libcapstone-dev \
            libreadline-dev \
            zlib1g-dev \
            libdw-dev \
            libasound2-dev \
            libsoundtouch-dev \
            libfuse2t64 \
            ca-certificates \
            file \
            wget \
            imagemagick

      - name: Build Lua 5.3
        run: |
          cd "Cheat Engine/lua53/lua53"
          make linux MYCFLAGS="-fPIC" -j"$(nproc)"

      - name: Cache FetchContent + build directory
        uses: actions/cache@v4
        with:
          path: cecore/build/_deps
          key: cecore-deps-release-${{ runner.os }}-keystone-0.9.2-v1

      - name: Configure + build (Release)
        run: |
          cmake -S cecore -B cecore/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build cecore/build -j"$(nproc)"

      - name: Run regression suite
        run: ./cecore/build/cecore_test

      - name: Fetch appimagetool
        run: |
          wget -q -O appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          cd cecore
          bash packaging/build-appimage.sh
          # The packaging script falls back to "AppDir ready" when appimagetool
          # isn't on PATH; pack ourselves here so the asset always exists.
          # ARG: append --appimage-extract-and-run as a fallback if libfuse2 still
          # isn't usable on the runner (containerised environments without FUSE).
          if ! ../appimagetool build/AppDir build/CheatEngine-x86_64.AppImage; then
            ../appimagetool --appimage-extract-and-run build/AppDir build/CheatEngine-x86_64.AppImage
          fi
          file build/CheatEngine-x86_64.AppImage

      - name: Upload AppImage to the release
        uses: softprops/action-gh-release@v2
        with:
          files: cecore/build/CheatEngine-x86_64.AppImage
          fail_on_unmatched_files: true
          generate_release_notes: false
